<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Afspraken beheer — Art of Cuts</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@0,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { background: var(--ink); color: var(--cream); min-height: 100vh; }
    .portal { max-width: 920px; margin: 0 auto; padding: 3rem 1.5rem 4rem; }
    .portal__head { margin-bottom: 2rem; }
    .portal__head-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }
    .portal__logout {
      flex-shrink: 0;
      margin-top: 0.35rem;
    }
    .portal__head h1 { font-family: var(--serif); font-size: clamp(2rem, 4vw, 2.8rem); margin: 0.4rem 0 0.6rem; }
    .portal__head p { color: var(--muted-light); }
    .portal__card {
      background: var(--ink-soft);
      border: 1px solid var(--line-light);
      border-radius: 18px;
      padding: 1.5rem;
      margin-bottom: 1.2rem;
    }
    .portal__login { display: grid; gap: 0.8rem; max-width: 360px; }
    .portal__login input {
      width: 100%;
      border: 1px solid var(--line-light);
      background: rgba(246, 241, 231, 0.05);
      color: var(--cream);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      font: inherit;
      font-size: 1rem;
    }
    .portal__barber-section { grid-column: 1 / -1; }
    .portal__barber-section > span {
      display: block;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted-light);
      margin-bottom: 0.65rem;
    }
    .portal__barbers {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
    }
    .portal__barber {
      font-family: var(--body);
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--cream);
      background: rgba(246, 241, 231, 0.05);
      border: 1px solid var(--line-light);
      border-radius: 999px;
      padding: 0.75rem 1.15rem;
      cursor: pointer;
      transition: background 0.25s var(--ease), border-color 0.25s var(--ease), color 0.25s var(--ease), transform 0.2s var(--ease);
    }
    .portal__barber:hover { border-color: var(--red); transform: translateY(-1px); }
    .portal__barber.is-active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }
    .portal__date-section { grid-column: 1 / -1; }
    .portal__date-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 0.65rem;
    }
    .portal__date-head span {
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted-light);
    }
    .portal__today {
      font-family: var(--body);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--red);
      background: transparent;
      border: 1px solid rgba(204, 43, 43, 0.45);
      border-radius: 999px;
      padding: 0.45rem 0.85rem;
      cursor: pointer;
    }
    .portal__today:hover { background: rgba(204, 43, 43, 0.12); }
    .portal__days {
      display: flex;
      gap: 0.65rem;
      overflow-x: auto;
      padding: 0.25rem 0 0.5rem;
      -webkit-overflow-scrolling: touch;
      scrollbar-color: rgba(204, 43, 43, 0.4) transparent;
    }
    .portal__days .day {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
      min-width: 80px;
      padding: 0.9rem 0.55rem 1rem;
      border: 1px solid var(--line-light);
      border-radius: 16px;
      background: rgba(246, 241, 231, 0.05);
      color: var(--cream);
      cursor: pointer;
      font-family: var(--body);
      transition: border-color 0.25s var(--ease), background 0.25s var(--ease), transform 0.2s var(--ease);
    }
    .portal__days .day:hover { border-color: var(--red); transform: translateY(-1px); }
    .portal__days .day.is-active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }
    .portal__days .day small {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted-light);
    }
    .portal__days .day.is-active small { color: rgba(255, 255, 255, 0.85); }
    .portal__days .day b {
      font-family: var(--serif);
      font-size: 1.55rem;
      font-weight: 500;
      line-height: 1;
    }
    .portal__days .day.is-closed { opacity: 0.45; }
    .portal__selected-label {
      margin-top: 0.35rem;
      font-family: var(--serif);
      font-size: 1.15rem;
      color: var(--cream);
    }
    .portal__toolbar {
      display: grid;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .portal__list { display: grid; gap: 0.75rem; }
    .portal__item {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 1rem;
      padding: 1rem;
      border-radius: 14px;
      border: 1px solid var(--line-light);
      background: rgba(246, 241, 231, 0.03);
      align-items: center;
    }
    .portal__time {
      font-family: var(--serif);
      font-size: 1.45rem;
      color: var(--red);
      line-height: 1;
    }
    .portal__item h3 { font-family: var(--serif); font-size: 1.2rem; margin-bottom: 0.2rem; }
    .portal__meta { color: var(--muted-light); font-size: 0.86rem; }
    .portal__cancel {
      font-family: var(--body);
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--red);
      background: transparent;
      border: 1px solid rgba(204, 43, 43, 0.45);
      border-radius: 999px;
      padding: 0.55rem 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.25s var(--ease), color 0.25s var(--ease);
    }
    .portal__cancel:hover { background: var(--red); color: #fff; }
    .portal__cancel:disabled { opacity: 0.5; cursor: not-allowed; }
    .portal__success {
      color: #7dcea0;
      font-size: 0.88rem;
      margin-bottom: 0.75rem;
    }
    .portal__empty, .portal__error { color: var(--muted-light); font-size: 0.92rem; }
    .portal__error { color: #ff8f8f; }
    .portal__back { color: var(--muted-light); font-size: 0.85rem; }
    .portal__open-section {
      margin: 1.25rem 0 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--line-light);
    }
    .portal__open-section h2 {
      font-family: var(--serif);
      font-size: 1.35rem;
      margin-bottom: 0.35rem;
    }
    .portal__open-lead {
      color: var(--muted-light);
      font-size: 0.88rem;
      margin-bottom: 1rem;
    }
    .portal__open-form {
      display: grid;
      gap: 0.85rem;
    }
    .portal__open-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }
    .portal__open-form label {
      display: grid;
      gap: 0.35rem;
      font-size: 0.8rem;
      color: var(--muted-light);
    }
    .portal__open-form input,
    .portal__open-form select {
      border: 1px solid var(--line-light);
      background: rgba(246, 241, 231, 0.05);
      color: var(--cream);
      border-radius: 12px;
      padding: 0.75rem 0.9rem;
      font: inherit;
      font-size: 0.95rem;
      color-scheme: dark;
    }
    .portal__open-modes {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
    }
    .portal__open-mode {
      font-family: var(--body);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--cream);
      background: rgba(246, 241, 231, 0.05);
      border: 1px solid var(--line-light);
      border-radius: 999px;
      padding: 0.65rem 1rem;
      cursor: pointer;
    }
    .portal__open-mode.is-active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }
    .portal__open-fields[hidden] { display: none; }
    .portal__override-list {
      display: grid;
      gap: 0.55rem;
      margin-top: 1rem;
    }
    .portal__override-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.75rem 0.9rem;
      border: 1px solid var(--line-light);
      border-radius: 12px;
      background: rgba(246, 241, 231, 0.03);
    }
    .portal__override-item span { font-size: 0.88rem; color: var(--cream); }
    .portal__override-remove {
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--red);
      background: transparent;
      border: 1px solid rgba(204, 43, 43, 0.45);
      border-radius: 999px;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
    }
    .portal__override-remove:hover { background: var(--red); color: #fff; }
    @media (max-width: 700px) {
      .portal { padding: 2rem 1rem 3rem; }
      .portal__toolbar { grid-template-columns: 1fr; }
      .portal__item { grid-template-columns: 1fr; }
      .portal__cancel { justify-self: start; width: 100%; padding: 0.75rem 1rem; }
      .portal__days .day { min-width: 88px; padding: 1rem 0.6rem 1.1rem; }
      .portal__days .day b { font-size: 1.75rem; }
      .portal__barber { font-size: 1rem; padding: 0.85rem 1.25rem; }
      .portal__head-row { flex-direction: column; align-items: stretch; }
      .portal__logout { width: 100%; margin-top: 0; }
      .portal__open-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="portal">
    <a href="index.html" class="portal__back">← Terug naar website</a>
    <div class="portal__head">
      <div class="portal__head-row">
        <div>
          <p class="label label--light">Kapper portaal</p>
          <h1>Afspraken agenda</h1>
          <p>Bekijk wie er vandaag en op andere dagen gepland staat.</p>
        </div>
        <button type="button" class="btn btn--red portal__logout" id="logoutBtn" hidden>Uitloggen</button>
      </div>
    </div>

    <section class="portal__card" id="loginCard">
      <form class="portal__login" id="loginForm">
        <label>
          Wachtwoord
          <input type="password" name="password" required autocomplete="current-password" />
        </label>
        <button type="submit" class="btn btn--red">Inloggen</button>
        <p class="portal__error" id="loginError" hidden></p>
      </form>
    </section>

    <section class="portal__card" id="agendaCard" hidden>
      <div class="portal__toolbar">
        <div class="portal__date-section">
          <div class="portal__date-head">
            <span>Datum</span>
            <button type="button" class="portal__today" id="agendaToday">Vandaag</button>
          </div>
          <div class="portal__days" id="agendaDays"></div>
          <p class="portal__selected-label" id="agendaDateLabel"></p>
        </div>
        <div class="portal__barber-section">
          <span>Kapper</span>
          <div class="portal__barbers" id="agendaBarbers">
            <button type="button" class="portal__barber is-active" data-barber="">Alle kappers</button>
            <button type="button" class="portal__barber" data-barber="bewar">Bewar Z.</button>
            <button type="button" class="portal__barber" data-barber="zennar">Zennar Z.</button>
          </div>
        </div>
      </div>

      <div class="portal__open-section">
        <h2>Extra openzetten</h2>
        <p class="portal__open-lead">Open soms een extra dag of tijd zodat klanten kunnen boeken.</p>
        <form class="portal__open-form" id="openForm">
          <div>
            <span class="portal__open-lead" style="display:block;margin-bottom:0.55rem;">Wat wil je openzetten?</span>
            <div class="portal__open-modes" id="openModes">
              <button type="button" class="portal__open-mode is-active" data-mode="day">Hele dag</button>
              <button type="button" class="portal__open-mode" data-mode="time">Enkele tijd</button>
            </div>
          </div>
          <div class="portal__open-row">
            <label>
              Datum
              <input type="date" name="date" id="openDate" required />
            </label>
            <label>
              Kapper
              <select name="barber" id="openBarber" required>
                <option value="bewar">Bewar Z.</option>
                <option value="zennar">Zennar Z.</option>
              </select>
            </label>
          </div>
          <div class="portal__open-fields" id="openDayFields">
            <div class="portal__open-row">
              <label>
                Van
                <input type="time" name="openTime" value="10:00" />
              </label>
              <label>
                Tot
                <input type="time" name="closeTime" value="18:00" />
              </label>
            </div>
          </div>
          <div class="portal__open-fields" id="openTimeFields" hidden>
            <label>
              Tijd
              <input type="time" name="time" value="19:00" />
            </label>
          </div>
          <button type="submit" class="btn btn--red">Openzetten voor klanten</button>
        </form>
        <div class="portal__override-list" id="overrideList"></div>
      </div>

      <p class="portal__success" id="agendaSuccess" hidden></p>
      <div class="portal__list" id="agendaList"></div>
      <p class="portal__empty" id="agendaEmpty" hidden>Geen afspraken op deze dag.</p>
      <p class="portal__error" id="agendaError" hidden></p>
    </section>
  </main>

  <script>
    const TOKEN_KEY = "artofcuts_portal_token";
    const loginCard = document.getElementById("loginCard");
    const agendaCard = document.getElementById("agendaCard");
    const loginForm = document.getElementById("loginForm");
    const loginError = document.getElementById("loginError");
    const agendaDays = document.getElementById("agendaDays");
    const agendaDateLabel = document.getElementById("agendaDateLabel");
    const agendaToday = document.getElementById("agendaToday");
    const agendaBarbers = document.getElementById("agendaBarbers");
    const agendaList = document.getElementById("agendaList");
    const agendaEmpty = document.getElementById("agendaEmpty");
    const agendaError = document.getElementById("agendaError");
    const agendaSuccess = document.getElementById("agendaSuccess");
    const logoutBtn = document.getElementById("logoutBtn");
    const openForm = document.getElementById("openForm");
    const openModes = document.getElementById("openModes");
    const openDayFields = document.getElementById("openDayFields");
    const openTimeFields = document.getElementById("openTimeFields");
    const openDate = document.getElementById("openDate");
    const openBarber = document.getElementById("openBarber");
    const overrideList = document.getElementById("overrideList");
    let openMode = "day";

    function getToken() {
      return sessionStorage.getItem(TOKEN_KEY);
    }

    function setToken(token) {
      sessionStorage.setItem(TOKEN_KEY, token);
    }

    function clearToken() {
      sessionStorage.removeItem(TOKEN_KEY);
    }

    function showLoggedIn() {
      loginCard.hidden = true;
      agendaCard.hidden = false;
      logoutBtn.hidden = false;
    }

    function showLoggedOut() {
      loginCard.hidden = false;
      agendaCard.hidden = true;
      logoutBtn.hidden = true;
    }

    const dayNames = ["zo", "ma", "di", "wo", "do", "vr", "za"];
    const dayNamesFull = ["zondag", "maandag", "dinsdag", "woensdag", "donderdag", "vrijdag", "zaterdag"];
    const monthNames = ["januari", "februari", "maart", "april", "mei", "juni", "juli", "augustus", "september", "oktober", "november", "december"];
    let selectedDate = null;

    function formatDateString(date) {
      return [
        date.getFullYear(),
        String(date.getMonth() + 1).padStart(2, "0"),
        String(date.getDate()).padStart(2, "0"),
      ].join("-");
    }

    function getSelectedDate() {
      return selectedDate || agendaDays.querySelector(".day.is-active")?.dataset.date || null;
    }

    function updateDateLabel(dateStr) {
      if (!dateStr || !agendaDateLabel) return;
      const [year, month, day] = dateStr.split("-").map(Number);
      const date = new Date(year, month - 1, day);
      agendaDateLabel.textContent = `${dayNamesFull[date.getDay()]} ${day} ${monthNames[date.getMonth()]} ${year}`;
    }

    function syncOpenFormDate() {
      const dateStr = getSelectedDate();
      if (dateStr && openDate) {
        openDate.value = dateStr;
      }
    }

    function setOpenMode(mode) {
      openMode = mode;
      openModes.querySelectorAll(".portal__open-mode").forEach((btn) => {
        btn.classList.toggle("is-active", btn.dataset.mode === mode);
      });
      openDayFields.hidden = mode !== "day";
      openTimeFields.hidden = mode !== "time";
    }

    function buildPortalDays(preferredDate) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const todayStr = formatDateString(today);
      selectedDate = preferredDate || getSelectedDate() || todayStr;

      agendaDays.innerHTML = "";
      for (let offset = 0; offset < 21; offset++) {
        const date = new Date(today);
        date.setDate(today.getDate() + offset);
        const dateStr = formatDateString(date);
        const isClosed = date.getDay() === 0 || date.getDay() === 1;
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "day" + (dateStr === selectedDate ? " is-active" : "") + (isClosed ? " is-closed" : "");
        btn.dataset.date = dateStr;
        btn.innerHTML = `<small>${dayNames[date.getDay()]}</small><b>${date.getDate()}</b>`;
        btn.addEventListener("click", () => {
          agendaDays.querySelectorAll(".day").forEach((d) => d.classList.remove("is-active"));
          btn.classList.add("is-active");
          selectedDate = dateStr;
          updateDateLabel(dateStr);
          syncOpenFormDate();
          loadAgenda();
          loadOverrides();
        });
        agendaDays.appendChild(btn);
      }

      updateDateLabel(selectedDate);
      syncOpenFormDate();
      const activeBtn = agendaDays.querySelector(`[data-date="${selectedDate}"]`);
      if (activeBtn) {
        activeBtn.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
      }
    }

    function setTodayOnDateInput() {
      const today = new Date();
      buildPortalDays(formatDateString(today));
    }

    function getSelectedBarber() {
      return agendaBarbers.querySelector(".portal__barber.is-active")?.dataset.barber ?? "";
    }

    agendaBarbers.addEventListener("click", (e) => {
      const btn = e.target.closest(".portal__barber");
      if (!btn) return;
      agendaBarbers.querySelectorAll(".portal__barber").forEach((b) => b.classList.remove("is-active"));
      btn.classList.add("is-active");
      loadAgenda();
    });

    async function cancelAppointment(id, name, time) {
      if (!confirm(`Afspraak annuleren?\n\n${name} om ${time}\n\nHet tijdslot wordt weer vrij voor anderen.`)) {
        return;
      }

      agendaSuccess.hidden = true;
      agendaError.hidden = true;

      try {
        const res = await fetch("/api/portal/cancel", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${getToken()}`,
          },
          body: JSON.stringify({ id }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Annuleren mislukt");

        agendaSuccess.hidden = false;
        agendaSuccess.textContent = data.message || "Afspraak geannuleerd";
        await loadAgenda();
      } catch (error) {
        agendaError.hidden = false;
        agendaError.textContent = error.message;
        if (error.message.includes("Niet ingelogd")) {
          clearToken();
          showLoggedOut();
        }
      }
    }

    async function loadOverrides() {
      if (!overrideList) return;
      overrideList.innerHTML = "Laden…";

      const date = openDate.value || getSelectedDate();
      const barber = openBarber.value;
      if (!date || !barber) {
        overrideList.innerHTML = "";
        return;
      }

      try {
        const params = new URLSearchParams({ date, barber });
        const res = await fetch(`/api/portal/overrides?${params}`, {
          headers: { Authorization: `Bearer ${getToken()}` },
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Kon openzettingen niet laden");

        overrideList.innerHTML = "";
        if (!data.overrides.length) {
          overrideList.innerHTML = '<p class="portal__empty">Geen extra openzettingen op deze dag.</p>';
          return;
        }

        data.overrides.forEach((item) => {
          const el = document.createElement("div");
          el.className = "portal__override-item";
          el.innerHTML = `
            <span>${item.barberName} · ${item.label}</span>
            <button type="button" class="portal__override-remove">Verwijderen</button>
          `;
          el.querySelector(".portal__override-remove").addEventListener("click", () => {
            removeOverride(item.id);
          });
          overrideList.appendChild(el);
        });
      } catch (error) {
        overrideList.innerHTML = "";
        overrideList.innerHTML = `<p class="portal__error">${error.message}</p>`;
        if (error.message.includes("Niet ingelogd")) {
          clearToken();
          showLoggedOut();
        }
      }
    }

    async function removeOverride(id) {
      if (!confirm("Deze openzetting verwijderen? Klanten kunnen dan niet meer op deze extra tijd/dag boeken.")) {
        return;
      }

      agendaSuccess.hidden = true;
      agendaError.hidden = true;

      try {
        const res = await fetch("/api/portal/overrides", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${getToken()}`,
          },
          body: JSON.stringify({ action: "delete", id }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Verwijderen mislukt");

        agendaSuccess.hidden = false;
        agendaSuccess.textContent = data.message || "Openzetting verwijderd";
        await loadOverrides();
      } catch (error) {
        agendaError.hidden = false;
        agendaError.textContent = error.message;
        if (error.message.includes("Niet ingelogd")) {
          clearToken();
          showLoggedOut();
        }
      }
    }

    openModes.addEventListener("click", (e) => {
      const btn = e.target.closest(".portal__open-mode");
      if (!btn) return;
      setOpenMode(btn.dataset.mode);
    });

    openDate.addEventListener("change", loadOverrides);
    openBarber.addEventListener("change", loadOverrides);

    openForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      agendaSuccess.hidden = true;
      agendaError.hidden = true;

      const formData = new FormData(openForm);
      const payload = {
        barber: formData.get("barber"),
        date: formData.get("date"),
        kind: "open",
      };

      if (openMode === "time") {
        payload.time = formData.get("time");
      } else {
        payload.openTime = formData.get("openTime");
        payload.closeTime = formData.get("closeTime");
      }

      try {
        const res = await fetch("/api/portal/overrides", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${getToken()}`,
          },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Openzetten mislukt");

        agendaSuccess.hidden = false;
        agendaSuccess.textContent = data.message || "Beschikbaarheid geopend voor klanten";
        await loadOverrides();
      } catch (error) {
        agendaError.hidden = false;
        agendaError.textContent = error.message;
        if (error.message.includes("Niet ingelogd")) {
          clearToken();
          showLoggedOut();
        }
      }
    });

    async function loadAgenda() {
      agendaError.hidden = true;
      agendaEmpty.hidden = true;
      agendaList.innerHTML = "Laden…";

      const params = new URLSearchParams({ date: getSelectedDate() });
      const barber = getSelectedBarber();
      if (barber) params.set("barber", barber);

      try {
        const res = await fetch(`/api/portal/appointments?${params}`, {
          headers: { Authorization: `Bearer ${getToken()}` },
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Kon agenda niet laden");

        agendaList.innerHTML = "";
        if (!data.appointments.length) {
          agendaEmpty.hidden = false;
          return;
        }

        data.appointments.forEach((item) => {
          const el = document.createElement("article");
          el.className = "portal__item";
          const name = `${item.firstName} ${item.lastName}`;
          el.innerHTML = `
            <div class="portal__time">${item.time}</div>
            <div>
              <h3>${name}</h3>
              <p class="portal__meta">${item.serviceName} · ${item.barberName}</p>
              <p class="portal__meta">${item.phone || "Geen telefoon"}${item.email ? ` · ${item.email}` : ""}</p>
            </div>
            <button type="button" class="portal__cancel">Annuleren</button>
          `;
          el.querySelector(".portal__cancel").addEventListener("click", () => {
            cancelAppointment(item.id, name, item.time);
          });
          agendaList.appendChild(el);
        });
      } catch (error) {
        agendaList.innerHTML = "";
        agendaError.hidden = false;
        agendaError.textContent = error.message;
        if (error.message.includes("Niet ingelogd")) {
          clearToken();
          showLoggedOut();
        }
      }
    }

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      loginError.hidden = true;

      const password = new FormData(loginForm).get("password");
      try {
        const res = await fetch("/api/portal/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Inloggen mislukt");

        setToken(data.token);
        showLoggedIn();
        setTodayOnDateInput();
        openDate.min = formatDateString(new Date());
        await loadAgenda();
        await loadOverrides();
      } catch (error) {
        loginError.hidden = false;
        loginError.textContent = error.message;
      }
    });

    agendaToday.addEventListener("click", () => {
      setTodayOnDateInput();
      loadAgenda();
      loadOverrides();
    });
    logoutBtn.addEventListener("click", () => {
      clearToken();
      showLoggedOut();
    });

    if (getToken()) {
      showLoggedIn();
      setTodayOnDateInput();
      openDate.min = formatDateString(new Date());
      loadAgenda();
      loadOverrides();
    } else {
      showLoggedOut();
    }
  </script>
</body>
</html>
